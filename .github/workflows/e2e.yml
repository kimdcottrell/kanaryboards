name: E2E Tests

on:
  pull_request:
  workflow_run:
    workflows: [Unit Tests]
    types:
      - completed

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: |
          npm config set @jsr:registry https://npm.jsr.io --location=project
          npm install

      - name: Wait for Deno Deploy and get preview URL
        id: preview-url
        uses: ./.github/actions/deno-deploy-preview-url
        with:
          deno-deploy-token: ${{ secrets.DENO_DEPLOY_TOKEN }}
          gh-token: ${{ github.token }}
          sha: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.repository }}

      - name: Print environment info
        run: |
          node -v
          npm -v
          npx playwright --version
          echo "CI=$CI"
          echo "BASE_URL=${{ steps.preview-url.outputs.base_url }}"
          uname -a

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run e2e tests
        run: npx playwright test
        env:
          BASE_URL: ${{ steps.preview-url.outputs.base_url }}
          PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_CLERK_USER_EMAIL: ${{ secrets.E2E_CLERK_USER_EMAIL }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
  
      - name: Upload Playwright artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
