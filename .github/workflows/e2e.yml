name: E2E Tests

on:
  status:

jobs:
  e2e:
    if: |
      github.event.state == 'success' &&
      github.event.context == 'deploy/kimdcottrell/kanaryboards'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Get preview URL
        id: preview-url
        env:
          DENO_DEPLOY_TOKEN: ${{ secrets.DENO_DEPLOY_TOKEN }}
        run: |
          REVISION_ID="${{ github.event.target_url }}"
          REVISION_ID="${REVISION_ID##*/}"
          for i in $(seq 1 12); do
            RESPONSE=$(curl -s -H "Authorization: Bearer $DENO_DEPLOY_TOKEN" \
              "https://api.deno.com/v2/revisions/$REVISION_ID/timelines")
            DOMAIN=$(echo "$RESPONSE" | jq -r '.[] | select(.slug == "preview") | .domains[0].domain // empty')
            if [ -n "$DOMAIN" ]; then
              echo "base_url=https://$DOMAIN" >> $GITHUB_OUTPUT
              exit 0
            fi
            sleep 5
          done
          echo "Timed out waiting for preview URL"
          exit 1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run e2e tests
        run: npx playwright test
        env:
          BASE_URL: ${{ steps.preview-url.outputs.base_url }}

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
