name: E2E Tests

on:
  pull_request:
  workflow_run:
    workflows: [Unit Tests]
    types:
      - completed

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - uses: ./.github/actions/install-npm-dependencies

      - name: Wait for Deno Deploy and get preview URL
        id: preview-url
        uses: ./.github/actions/deno-deploy-preview-url
        with:
          deno-deploy-token: ${{ secrets.DENO_DEPLOY_TOKEN }}
          gh-token: ${{ github.token }}
          sha: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.repository }}

      - name: Print environment info
        run: |
          node -v
          npm -v
          npx playwright --version
          echo "CI=$CI"
          echo "BASE_URL=${{ steps.preview-url.outputs.base_url }}"
          uname -a

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run e2e tests
        id: run-tests
        run: npx playwright test --reporter=list,json
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: results.json
          BASE_URL: ${{ steps.preview-url.outputs.base_url }}
          PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_CLERK_USER_EMAIL: ${{ secrets.E2E_CLERK_USER_EMAIL }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}

      - name: Upload Playwright artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 3

      - name: Deploy report to Cloudflare Pages
        if: failure()
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy playwright-report --project-name=kanby --branch=pr-${{ github.event.pull_request.number }}

      - name: Write summary
        if: always()
        env:
          REPORT_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
        run: |
          {
            if [ -n "$REPORT_URL" ]; then
              echo "🔦 Playwright failure report: $REPORT_URL"
            else
              echo "🎉 All Playwright tests succeeded!"
            fi
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ ! -f results.json ]; then
            echo "No Playwright results found." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          jq -r '
            def collect(path):
              ( .suites[]? | collect(path + [.title]) ),
              ( .specs[]? | { title: ((path + [.title]) | join(" > ")), file: .file, tests: .tests } )
            ;

            . as $root
            | ($root.config.retries // 0) as $maxRetries
            | [$root.suites[]? | collect([])] as $specs
            | ($specs
                | map(.title as $t | .file as $f | .tests[] | {title: $t, file: $f, project: .projectName, status: .status, retries: ((.results // []) | length)})
                | map(select(.project == "chromium" or .project == "firefox" or .project == "webkit"))
              ) as $tests
            | ($tests | map(select(.status=="expected")) | length) as $passed
            | ($tests | map(select(.status=="flaky")) | length) as $flaky
            | ($tests | map(select(.status=="unexpected")) | length) as $failed
            | ($tests | map(select(.status=="skipped")) | length) as $skipped
            | ($tests | length) as $total
            | ($tests | map(select(.status=="flaky"))) as $flakyTests
            | [
                "### Summary",
                "",
                "- **Test Results:** " + (if $failed>0 then "❌ " + ($failed|tostring) + " failures · " else "" end) + "✅ " + ($passed|tostring) + " passes · ⚠️ " + ($flaky|tostring) + " flaky" + (if $skipped>0 then " · ⏭️ " + ($skipped|tostring) + " skipped" else "" end) + " · " + ($total|tostring) + " total"
              ]
              + (if ($flakyTests|length) > 0 then
                  [
                    "",
                    "### Flaky Tests",
                    "",
                    "These tests passed only after one or more retries on a specific browser, indicating potential instability.",
                    ""
                  ] + (
                    $flakyTests | group_by(.file) | map(
                      ["`" + .[0].file + "` (" + (length|tostring) + " flaky)", ""]
                      + (map("- `" + .title + "` — flaky on **" + .project + "** (passed on retry " + ((.retries-1)|tostring) + " out of " + ($maxRetries|tostring) + ")"))
                      + [""]
                    ) | flatten
                  )
                else [] end)
            | join("\n")
          ' results.json >> "$GITHUB_STEP_SUMMARY"
