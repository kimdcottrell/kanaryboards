name: E2E Tests

on:
  pull_request:
  workflow_run:
    workflows: [Unit Tests]
    types:
      - completed

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - uses: ./.github/actions/install-npm-dependencies

      - name: Wait for Deno Deploy and get preview URL
        id: preview-url
        uses: ./.github/actions/deno-deploy-preview-url
        with:
          deno-deploy-token: ${{ secrets.DENO_DEPLOY_TOKEN }}
          gh-token: ${{ github.token }}
          sha: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.repository }}

      - name: Print environment info
        run: |
          node -v
          npm -v
          npx playwright --version
          echo "CI=$CI"
          echo "BASE_URL=${{ steps.preview-url.outputs.base_url }}"
          uname -a

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project }}

      - name: Run e2e tests
        id: run-tests
        run: npx playwright test --project=${{ matrix.project }}
        env:
          BASE_URL: ${{ steps.preview-url.outputs.base_url }}
          PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_CLERK_USER_EMAIL: ${{ secrets.E2E_CLERK_USER_EMAIL }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
  
      - name: Upload Playwright artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 3

      - name: Deploy report to Cloudflare Pages
        if: failure()
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy playwright-report --project-name=kanby --branch=pr-${{ github.event.pull_request.number }}-${{ matrix.project }}

      - name: Save run status
        if: always()
        run: |
          jq -n \
            --arg project "${{ matrix.project }}" \
            --arg status "${{ steps.run-tests.outcome }}" \
            --arg url "${{ steps.deploy.outputs.pages-deployment-alias-url }}" \
            '{project: $project, status: $status, url: $url}' > status.json

      - name: Upload run status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-${{ matrix.project }}
          path: status.json
          retention-days: 3

  e2e-summary:
    needs: e2e
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download run statuses
        uses: actions/download-artifact@v4
        with:
          pattern: status-*
          path: statuses

      - name: Write summary
        run: |
          shopt -s nullglob
          files=(statuses/*/status.json)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No status reports found." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          failures="$(jq -s 'map(select(.status != "success")) | length' "${files[@]}")"

          if [ "$failures" -eq 0 ]; then
            echo "🎉 All Playwright tests succeeded in all browsers." >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "| Status | Browser | Report |"
              echo "| --- | --- | --- |"
              jq -s -r '.[] | "| " + (if .status == "success" then "✅" else "❌" end) + " | " + .project + " | " + (if .url != "" then ("[Report](" + .url + ")") else "—" end) + " |"' "${files[@]}"
            } >> "$GITHUB_STEP_SUMMARY"
          fi