name: Unit Tests

on:
  pull_request:

jobs:
  vitest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - run: echo "Deno version is ${{ steps.deno.outputs.deno-version }}"

      - name: Install dependencies
        run: deno install

      - name: Run unit tests
        run: deno task vitest

