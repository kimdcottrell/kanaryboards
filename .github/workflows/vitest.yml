name: Unit Tests

on:
  pull_request:
  workflow_run:
    workflows: [Static Analysis]
    types:
      - completed
    

jobs:
  vitest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run unit tests
        run: deno task vitest --run

