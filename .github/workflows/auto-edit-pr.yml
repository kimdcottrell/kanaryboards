name: Auto Edit PR

on: 
  pull_request:

jobs:
  edit-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Required for proper branch comparison

      - name: Generate and update PR description
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
            --allowedTools "Bash(git log:*),
            Bash(gh pr diff:*),
            Bash(gh pr view:*),
            mcp__github_inline_comment__create_inline_comment"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Update the description of the existing PR for branch ${{ github.ref_name }}.

            Use only these commands to gather information:
            - git log origin/main..HEAD --format='* %s%n%b'
            - gh pr diff
            - gh pr view --json number,body --jq '{number: .number, body: .body}'

            Steps:
            1. Run git log and git diff to understand what changed.
            2. Get the existing PR number and current body: gh pr view --json number,body --jq '{number: .number, body: .body}'
            3. If no PR exists, exit without doing anything.
            4. Write a concise markdown PR description with a summary paragraph and bullet list of key changes.
            5. Update the PR body description
